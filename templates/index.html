<!doctype html>
<html>
  <head>
    <title>Bat Compression Lookup</title>
    <style>
      body {
        font-family: Arial;
        padding: 40px;
        max-width: 600px;
        margin: auto;
      }
      input {
        padding: 10px;
        width: 100%;
        font-size: 16px;
      }
      button {
        padding: 10px;
        margin-top: 10px;
        width: 100%;
        font-size: 16px;
      }
      #result {
        margin-top: 20px;
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <h2>Barrel Compression Lookup</h2>

    <input id="modelInput" placeholder="Enter model number" />
    <button onclick="lookup()">Search</button>

    <div id="result"></div>

    <script>
      async function lookup() {
        const model = document.getElementById("modelInput").value.trim();

        if (!model) return;

        const response = await fetch(`/lookup?model=${model}`);
        const resultDiv = document.getElementById("result");

        if (response.status === 404) {
          resultDiv.innerHTML = "Model not found.";
          return;
        }

        const data = await response.json();
        const bat = data[0];

        resultDiv.innerHTML = `
        <strong>Manufacturer:</strong> ${bat.Manufacturer}<br>
        <strong>Model:</strong> ${bat.Model}<br>
        <strong>Cutoff:</strong> ${bat["Barrel Compression Cutoff (psi)"]} psi<br>
        <strong>Date Added:</strong> ${bat["Date Added"]}
    `;
      }
    </script>
  </body>
</html>
